<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de RPPN · SEF-MG</title>
    <meta name="author" content="Pedro Cardoso">
    <link rel="icon" type="image/x-icon" href="../../assets/images/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/globals.css">
</head>

<body class="bg-[#F6F6F6] font-sans antialiased text-[#000000]">
    <div class="flex min-h-screen">
        <aside></aside>
        <div class="flex-1 flex flex-col h-screen overflow-hidden">
            <header></header>
            <main class="flex-1 p-8 bg-[#F6F6F6] overflow-hidden flex flex-col">
                <div class="mb-8 shrink-0">
                    <h2 class="text-3xl font-black text-[#003D5D] mb-1 normal-case tracking-tight">Relatórios
                        Consolidados</h2>
                    <p class="text-slate-500 font-medium text-sm">Visão analítica completa das justificativas de RPPN.
                    </p>
                </div>

                <div class="flex-1 flex gap-6 min-h-0 overflow-hidden">
                    <aside id="sidebarFilters"
                        class="w-72 bg-white border-2 border-slate-200 rounded-[1.5rem] shadow-sm flex flex-col overflow-hidden shrink-0 transition-[width]">
                        <div class="p-5 border-b-2 border-slate-100 flex items-center justify-between bg-slate-50/30">
                            <h3
                                class="text-[12px] font-black text-[#003D5D] uppercase tracking-wider flex items-center gap-2">
                                <i class='bx bx-filter-alt text-slate-400'></i> Filtros
                            </h3>
                            <button onclick="clearAllTableFilters()"
                                class="text-[10px] font-bold text-rose-500 hover:text-rose-600 uppercase transition-colors">
                                Limpar
                            </button>
                        </div>

                        <div class="flex-1 overflow-y-auto p-5 space-y-6 custom-scrollbar" id="sidebarScrollContainer">
                            <div class="space-y-3">
                                <label
                                    class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Decisão</label>
                                <div id="checkboxDecisao" class="space-y-1 min-h-[40px]">
                                    <div class="animate-pulse space-y-2">
                                        <div class="h-8 bg-slate-100 rounded-xl w-full"></div>
                                        <div class="h-8 bg-slate-100 rounded-xl w-3/4"></div>
                                    </div>
                                </div>
                            </div>

                            <div class="space-y-3">
                                <label
                                    class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Status</label>
                                <div id="checkboxStatus" class="space-y-1 min-h-[40px]">
                                    <div class="animate-pulse space-y-2">
                                        <div class="h-8 bg-slate-100 rounded-xl w-full"></div>
                                        <div class="h-8 bg-slate-100 rounded-xl w-4/5"></div>
                                    </div>
                                </div>
                            </div>

                            <div class="space-y-2">
                                <label
                                    class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">UO</label>
                                <select id="filterUO" multiple data-placeholder="Todas" class="hidden"></select>
                            </div>

                            <div class="space-y-2">
                                <label
                                    class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">UE</label>
                                <select id="filterUE" multiple data-placeholder="Todas" class="hidden"></select>
                            </div>

                            <div class="space-y-3" id="filterSaldoContainer">
                                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Saldo
                                    Restos a Pagar Não Processado</label>
                                <div id="saldoSkeleton" class="animate-pulse flex gap-2">
                                    <div class="w-1/2 h-9 bg-slate-100 rounded-xl"></div>
                                    <div class="w-1/2 h-9 bg-slate-100 rounded-xl"></div>
                                </div>
                                <div id="saldoInputs" class="hidden flex gap-2">
                                    <input type="number" id="filterSaldoMin" placeholder="Min"
                                        class="w-1/2 p-2 bg-slate-50 border-2 border-slate-100 rounded-xl text-[12px] font-bold focus:border-[#003D5D] focus:ring-4 focus:ring-[#003D5D]/5 outline-none transition-all">
                                    <input type="number" id="filterSaldoMax" placeholder="Max"
                                        class="w-1/2 p-2 bg-slate-50 border-2 border-slate-100 rounded-xl text-[12px] font-bold focus:border-[#003D5D] focus:ring-4 focus:ring-[#003D5D]/5 outline-none transition-all">
                                </div>
                            </div>

                            <div class="space-y-2">
                                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Ano
                                    Origem Restos a Pagar</label>
                                <select id="filterAno" multiple data-placeholder="Todos" class="hidden"></select>
                            </div>

                            <div class="pt-4 border-t-2 border-slate-50">
                                <button onclick="toggleMoreFilters()"
                                    class="w-full flex items-center justify-between group">
                                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Mais
                                        Filtros</span>
                                    <i id="iconMoreFilters"
                                        class='bx bx-chevron-down text-slate-400 group-hover:text-[#003D5D] transition-all'></i>
                                </button>
                                <div id="moreFiltersContent" class="hidden mt-4 space-y-4">
                                    <div class="space-y-2">
                                        <label
                                            class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Programa</label>
                                        <select id="filterPrograma" multiple data-placeholder="Todos"
                                            class="hidden"></select>
                                    </div>
                                    <div class="space-y-2">
                                        <label
                                            class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Elemento
                                            Item</label>
                                        <select id="filterElemento" multiple data-placeholder="Todos"
                                            class="hidden"></select>
                                    </div>
                                    <div class="space-y-2">
                                        <label
                                            class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Função</label>
                                        <select id="filterFuncao" multiple data-placeholder="Todas"
                                            class="hidden"></select>
                                    </div>
                                    <div class="space-y-2">
                                        <label
                                            class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Subfunção</label>
                                        <select id="filterSubfuncao" multiple data-placeholder="Todas"
                                            class="hidden"></select>
                                    </div>
                                    <div class="space-y-2">
                                        <label
                                            class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Procedência</label>
                                        <select id="filterProcedencia" multiple data-placeholder="Todas"
                                            class="hidden"></select>
                                    </div>
                                    <div class="space-y-2">
                                        <label
                                            class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Projeto
                                            Atividade</label>
                                        <select id="filterProjetoAtividade" multiple data-placeholder="Todos"
                                            class="hidden"></select>
                                    </div>
                                    <div class="space-y-2">
                                        <label
                                            class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Status
                                            (Filtro Original)</label>
                                        <select id="filterStatus" multiple data-placeholder="Todos"
                                            class="hidden"></select>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="p-4 border-t-2 border-slate-100 bg-slate-50/50">
                            <div class="flex items-center justify-between">
                                <span class="text-[10px] font-bold text-slate-400 uppercase">Total</span>
                                <span id="filterResultCount"
                                    class="text-[11px] font-black text-[#003D5D] bg-[#003D5D]/10 px-2 py-0.5 rounded-full">0</span>
                            </div>
                        </div>
                    </aside>

                    <div id="sidebarResizer"
                        class="group flex items-center justify-center w-2 -mx-4 cursor-col-resize z-20 transition-colors">
                        <div class="w-1 h-12 bg-slate-200 rounded-full group-hover:bg-[#003D5D]/30 transition-colors">
                        </div>
                    </div>

                    <div
                        class="flex-1 bg-white border-2 border-slate-200 rounded-[1.5rem] shadow-sm flex flex-col overflow-hidden relative">
                        <div
                            class="px-6 py-4 border-b-2 border-slate-100 flex items-center justify-between bg-slate-50/10">
                            <div class="flex items-center gap-3">
                                <button id="btnColumns"
                                    class="px-4 py-2 bg-[#003D5D] text-white rounded-xl hover:bg-[#002D45] transition-all shadow-md shadow-[#003D5D]/20 flex items-center gap-2">
                                    <i class='bx bx-columns text-lg'></i>
                                    <span class="text-[11px] font-bold uppercase tracking-wider">Colunas</span>
                                </button>
                            </div>
                            <div class="flex items-center gap-2">
                                <button onclick="exportCSV()"
                                    class="h-10 px-4 border-2 border-slate-200 bg-white text-slate-600 rounded-xl hover:bg-slate-50 transition-all flex items-center gap-2">
                                    <i class='bx bx-file text-lg text-slate-400'></i>
                                    <span class="text-[11px] font-bold uppercase">CSV</span>
                                </button>
                                <button onclick="exportExcel()"
                                    class="h-10 px-4 bg-emerald-600 text-white rounded-xl hover:bg-emerald-700 transition-all shadow-md shadow-emerald-600/20 flex items-center gap-2">
                                    <i class='bx bx-spreadsheet text-lg'></i>
                                    <span class="text-[11px] font-bold uppercase">Excel</span>
                                </button>
                            </div>
                        </div>

                        <div id="stateLoading" class="flex-1 flex flex-col items-center justify-center p-12 space-y-4">
                            <i class='bx bx-loader-alt bx-spin text-4xl text-[#003D5D]'></i>
                            <p class="text-sm font-bold text-slate-400 uppercase tracking-widest">Carregando dados...
                            </p>
                        </div>

                        <div id="stateEmpty"
                            class="hidden flex-1 flex flex-col items-center justify-center p-12 space-y-4">
                            <i class='bx bx-search-alt text-4xl text-slate-200'></i>
                            <p class="text-sm font-bold text-slate-400 uppercase tracking-widest">Nenhum registro
                                encontrado</p>
                        </div>

                        <div id="stateTable" class="hidden flex-1 flex flex-col min-h-0">
                            <div class="flex-1 overflow-x-auto min-h-0">
                                <table class="min-w-full divide-y-2 divide-slate-100 table-fixed">
                                    <thead class="bg-slate-50/80 sticky top-0 z-10 backdrop-blur-sm">
                                        <tr id="tableHead"></tr>
                                    </thead>
                                    <tbody id="tableBody" class="bg-white divide-y-2 divide-slate-50"></tbody>
                                </table>
                            </div>

                            <div id="paginationWrap"
                                class="px-8 py-4 border-t-2 border-slate-100 bg-slate-50/30 flex items-center justify-between shrink-0">
                                <div class="flex items-center gap-6">
                                    <p class="text-[11px] font-bold text-slate-400" id="paginationInfo">—</p>
                                    <div class="flex items-center gap-2">
                                        <span class="text-[10px] font-bold text-slate-400">Exibir:</span>
                                        <select id="rowsPerPage" onchange="handleRowsPerPageChange()"
                                            class="bg-white border-2 border-slate-200 rounded-xl px-2 py-1 text-xs font-bold text-slate-600 outline-none focus:border-[#003D5D]">
                                            <option value="10">10</option>
                                            <option value="25">25</option>
                                            <option value="50">50</option>
                                            <option value="100">100</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="flex items-center gap-4">
                                    <button id="btnPrev" onclick="changePage(-1)"
                                        class="w-10 h-10 flex items-center justify-center bg-white border-2 border-slate-200 rounded-xl text-slate-500 hover:border-[#003D5D] disabled:opacity-30 shadow-sm transition-all focus:ring-4 focus:ring-[#003D5D]/5">
                                        <i class='bx bx-chevron-left text-2xl'></i>
                                    </button>
                                    <span
                                        class="text-[11px] font-black text-[#003D5D] bg-[#003D5D]/5 w-10 h-10 flex items-center justify-center rounded-xl"
                                        id="pageNumber">1</span>
                                    <button id="btnNext" onclick="changePage(1)"
                                        class="w-10 h-10 flex items-center justify-center bg-white border-2 border-slate-200 rounded-xl text-slate-500 hover:border-[#003D5D] disabled:opacity-30 shadow-sm transition-all focus:ring-4 focus:ring-[#003D5D]/5">
                                        <i class='bx bx-chevron-right text-2xl'></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>

    <script src="../../components/core/api.js"></script>
    <script src="../../components/core/session.js"></script>
    <script src="../../components/core/csv.js"></script>
    <script src="../../components/layout/layout.js"></script>
    <script src="../../components/ui/custom-table.js"></script>
    <script src="../../components/ui/custom-select.js"></script>

    <script src="../../components/core/mapper.js"></script>
    <script src="./script.js"></script>
</body>

</html>
