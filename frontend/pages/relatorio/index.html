<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatórios — Gestão de RPPN · SEF-MG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/globals.css">
</head>

<body class="bg-[#F6F6F6] font-sans antialiased text-[#000000]">
    <div class="flex min-h-screen">
        <aside></aside>
        <div class="flex-1 flex flex-col h-screen overflow-hidden">
            <header></header>
            <main class="flex-1 p-8 bg-[#F6F6F6] overflow-y-auto">
                <div class="max-w-7xl mx-auto">
                    <div class="mb-10">
                        <h2 class="text-3xl font-black text-[#003D5D] mb-2 normal-case [letter-spacing:normal]">
                            Relatórios Consolidados</h2>
                        <p class="text-slate-500 font-medium normal-case [letter-spacing:normal]">Visão analítica
                            completa das justificativas de RPPN.</p>
                    </div>

                    <div class="bg-white border-2 border-slate-200 rounded-[1.5rem] shadow-sm overflow-hidden">
                        <div
                            class="px-8 py-7 border-b-2 border-slate-100 flex items-center justify-between flex-wrap gap-4 bg-slate-50/20">
                            <div class="flex items-center gap-4 flex-wrap sm:flex-nowrap flex-1">
                                <div class="relative group w-full sm:w-80">
                                    <input id="searchInput" type="text" placeholder="Pesquisar registros…"
                                        oninput="filterTable()"
                                        class="pl-12 pr-6 py-4 bg-white border-2 border-slate-200 rounded-2xl text-[14px] font-medium text-slate-700 focus:ring-8 focus:ring-[#003D5D]/5 focus:border-[#003D5D] w-full transition-all outline-none">
                                    <i
                                        class='bx bx-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 text-xl transition-colors group-focus-within:text-[#003D5D]'></i>
                                </div>
                            </div>
                            <div class="flex items-center gap-3">
                                <button onclick="exportCSV()"
                                    class="p-3.5 bg-white text-slate-600 rounded-2xl hover:bg-[#003D5D] hover:text-white transition-all border-2 border-slate-200 shadow-sm flex items-center gap-2 px-6">
                                    <i class='bx bx-file text-xl'></i>
                                    <span class="text-[12px] font-bold">Exportar CSV</span>
                                </button>
                                <button onclick="exportExcel()"
                                    class="p-3.5 bg-emerald-600 text-white rounded-2xl hover:bg-emerald-700 transition-all border-2 border-emerald-600 shadow-lg shadow-emerald-100 flex items-center gap-2 px-6">
                                    <i class='bx bx-spreadsheet text-xl'></i>
                                    <span class="text-[12px] font-bold">Exportar Excel</span>
                                </button>
                            </div>
                        </div>

                        <div id="filterPanel" class="border-b-2 border-slate-100 p-8 bg-white">
                            <div class="flex items-center justify-between mb-8 pb-4 border-b-2 border-slate-100/60">
                                <h3 class="text-[14px] font-black text-[#003D5D] tracking-tight">Filtros Avançados</h3>
                                <button onclick="clearAllTableFilters()"
                                    class="text-slate-400 hover:text-slate-600 text-[11px] font-semibold flex items-center gap-1.5 focus:outline-none">
                                    <i class='bx bx-x-circle text-[16px]'></i> Limpar filtros
                                </button>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                <div class="space-y-2">
                                    <label class="text-[10px] font-bold text-slate-400 ml-2">Unidade Executora</label>
                                    <select id="filterUE" multiple class="hidden"></select>
                                </div>
                                <div class="space-y-2">
                                    <label class="text-[10px] font-bold text-slate-400 ml-2">Programa</label>
                                    <select id="filterPrograma" multiple class="hidden"></select>
                                </div>
                                <div class="space-y-2">
                                    <label class="text-[10px] font-bold text-slate-400 ml-2">Elemento Item</label>
                                    <select id="filterElemento" multiple class="hidden"></select>
                                </div>
                                <div class="space-y-2">
                                    <label class="text-[10px] font-bold text-slate-400 ml-2">Status</label>
                                    <select id="filterStatus" multiple class="hidden"></select>
                                </div>
                            </div>
                            <div class="mt-4 flex justify-end">
                                <p id="filterResultCount"
                                    class="text-[11px] font-bold text-slate-400 tracking-wider transition-opacity opacity-0">
                                </p>
                            </div>
                        </div>

                        <div id="stateLoading"
                            class="flex flex-col items-center justify-center py-40 text-slate-400 bg-white">
                            <i class='bx bx-loader-alt text-6xl animate-spin mb-6 text-[#003D5D]'></i>
                            <p class="text-sm font-bold text-slate-600">Sincronizando dados…</p>
                        </div>

                        <div id="stateTable" class="hidden bg-white overflow-x-auto min-h-[500px]">
                            <table class="min-w-full divide-y-2 divide-slate-100 table-fixed">
                                <thead class="bg-slate-50/80 sticky top-0 z-10 backdrop-blur-sm">
                                    <tr id="tableHead"></tr>
                                </thead>
                                <tbody id="tableBody" class="bg-white divide-y-2 divide-slate-50"></tbody>
                            </table>
                        </div>

                        <div id="paginationWrap"
                            class="hidden px-8 py-6 border-t-2 border-slate-100 bg-slate-50/50 flex items-center justify-between">
                            <div class="flex items-center gap-6">
                                <p class="text-[11px] font-bold text-slate-400" id="paginationInfo">—</p>
                                <div class="flex items-center gap-2">
                                    <span class="text-[10px] font-bold text-slate-400">Exibir:</span>
                                    <select id="rowsPerPage" onchange="handleRowsPerPageChange()"
                                        class="bg-white border-2 border-slate-200 rounded-xl px-2 py-1 text-xs font-bold text-slate-600 outline-none">
                                        <option value="10">10</option>
                                        <option value="25">25</option>
                                        <option value="50">50</option>
                                        <option value="100">100</option>
                                    </select>
                                </div>
                            </div>
                            <div class="flex items-center gap-4">
                                <button id="btnPrev" onclick="changePage(-1)"
                                    class="w-10 h-10 flex items-center justify-center bg-white border-2 border-slate-200 rounded-xl text-slate-500 hover:border-[#003D5D] disabled:opacity-30 shadow-sm transition-all">
                                    <i class='bx bx-chevron-left text-2xl'></i>
                                </button>
                                <span class="text-[11px] font-black text-slate-800" id="pageNumber">1</span>
                                <button id="btnNext" onclick="changePage(1)"
                                    class="w-10 h-10 flex items-center justify-center bg-white border-2 border-slate-200 rounded-xl text-slate-500 hover:border-[#003D5D] disabled:opacity-30 shadow-sm transition-all">
                                    <i class='bx bx-chevron-right text-2xl'></i>
                                </button>
                            </div>
                        </div>

                        <div id="stateEmpty"
                            class="hidden flex flex-col items-center justify-center py-40 text-slate-400 bg-white text-center">
                            <i class='bx bx-ghost text-6xl mb-6'></i>
                            <p class="text-sm font-bold text-slate-600">Nenhum registro encontrado.</p>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- External Libraries -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

    <!-- Core Scripts -->
    <script src="../../components/core/api.js"></script>
    <script src="../../components/core/session.js"></script>
    <script src="../../components/core/csv.js"></script>
    <script src="../../components/layout/layout.js"></script>

    <!-- UI Helper Scripts -->
    <script src="../../components/ui/custom-select.js"></script>

    <script src="./script.js"></script>
</body>

</html>
