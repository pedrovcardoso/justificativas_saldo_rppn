openapi: 3.0.3
info:
  title: API de Autenticação OTP
  version: 1.0.0
  description: API para autenticação de usuários via OTP com token simples.
servers:
  - url: https://default4c86fd71d0164231a16057311d68b9.51.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/6268733c89d34beab95650687b639b00/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=ASdpJccB3BlVWq_VnabESl91OirL3FRe6Uxy5L6dgT4
    description: Servidor principal

paths:
  /send_otp:
    post:
      summary: Enviar OTP para o usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OTPRequest'
      responses:
        '200':
          description: OTP enviado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
              example:
                success: true
                message: "OTP enviado com sucesso por email."
        '400':
          description: Formato de usuário inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
              example:
                success: false
                error: "Formato de usuário inválido."
        '404':
          description: Usuário não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
              example:
                success: false
                error: "Usuário não encontrado."

  /validate_otp:
    post:
      summary: Validar OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OTPRequest'
      responses:
        '200':
          description: OTP validado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
              example:
                success: true
                message: "OTP validado com sucesso."
                data:
                  token: "abc123token"
                  expires_in: 3600
        '400':
          description: Formato inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
              example:
                success: false
                error: "Formato de usuário ou OTP inválido."
        '401':
          description: OTP inválido ou expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
              examples:
                otp_invalido:
                  summary: OTP incorreto
                  value:
                    success: false
                    error: "OTP inválido."
                otp_expirado:
                  summary: OTP expirado
                  value:
                    success: false
                    error: "OTP expirado."
        '409':
          description: OTP já utilizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
              example:
                success: false
                error: "OTP já utilizado."

  /validate_session:
    post:
      summary: Revalidar sessão com token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OTPRequest'
      responses:
        '200':
          description: Sessão revalidada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
              example:
                success: true
                message: "Sessão revalidada com sucesso."
                data:
                  token: "abc123token"
                  expires_in: 3600
        '400':
          description: Formato de token ou usuário inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
              example:
                success: false
                error: "Formato de token ou usuário inválido."
        '401':
          description: Token expirado ou não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
              examples:
                token_expirado:
                  summary: Token expirado
                  value:
                    success: false
                    error: "Token expirado."
                token_nao_encontrado:
                  summary: Token não encontrado
                  value:
                    success: false
                    error: "Token não encontrado."

  /logout:
    post:
      summary: Encerrar sessão
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OTPRequest'
      responses:
        '200':
          description: Logout realizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
              example:
                success: true
                message: "Logout realizado com sucesso."

components:
  schemas:
    OTPRequest:
      type: object
      properties:
        action:
          type: string
        user:
          type: string
        otp_code:
          type: string
        otp_channel:
          type: string
        token:
          type: string
      required:
        - action
        - user

    SuccessMessage:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message

    ErrorMessage:
      type: object
      properties:
        success:
          type: boolean
        error:
          type: string
      required:
        - success
        - error

    TokenResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            token:
              type: string
            expires_in:
              type: integer
      required:
        - success
        - message
        - data